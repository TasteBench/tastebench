run_name: dmpnn_base
seed: 42

data:
  train_csv: molecular/data/splits/fart_train.csv
  val_csv:   molecular/data/splits/fart_val.csv
  test_csv:  molecular/data/splits/fart_test.csv
  smiles_column: "Canonicalized SMILES"
  label_column:  "Canonicalized Taste"
  label_order:   ["sweet", "bitter", "sour", "umami", "undefined"]

model:
  type: dmpnn
  hidden_dim: 300
  depth: 3
  dropout: 0.0
  n_classes: 5

training:
  batch_size: 50
  max_epochs: 50
  patience: 10
  init_lr: 1.0e-4
  device: auto
  class_weighting: inverse_frequency

wandb:
  project: taste_gnn
  mode: online
