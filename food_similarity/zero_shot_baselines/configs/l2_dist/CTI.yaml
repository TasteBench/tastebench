# Ablation: compound + text + image
# Distance: l2, Normalization: rank (percentile within category)
# Features: Compound embeddings, Ingredient text embeddings, DINOv3 image embeddings

experiment_name: l2_dist/l2_CTI

model:
  type: distance_predictor
  distance_metric: l2
  normalization_method: rank

features:
  # Compound embeddings (FoodAtlas)
  compound:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    food_atlas_dir: ../../data/food_atlas/v4.0
    smiles_cache: ../../shared/data/caches/smiles_cache.csv
    embeddings_cache: ../../shared/data/caches/fart_compound_embeddings.pkl
    ingredient_agg_method: weighted_average
    product_agg_method: weighted_average
  # Ingredient text embeddings (Qwen3-Embedding)
  ingredient_text:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    model_name: Qwen/Qwen3-Embedding-0.6B
    instruction: "Instruct: Given a food ingredient list, identify products with similar taste, texture, and sensory properties\nQuery:"
  # DINOv3 image embeddings
  image:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    model_name: dinov3_vitl16

missing_feature_strategy: skip
random_seed: 42

data:
  data_dir: data/competition
  labels_path: data/product_labels_manually_cleaned.csv
