# Ablation: nutrition + text + image
# Distance: cosine, Normalization: rank (percentile within category)
# Features: Nutrition (category-specific), Ingredient text embeddings, DINOv3 image embeddings

experiment_name: cosine_dist/cosine_NTI

model:
  type: distance_predictor
  distance_metric: cosine
  normalization_method: rank

features:
  # Meat: Total Fat, Sodium, Protein, Dietary Fiber
  nutrition_meat:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    normalize_per_100g: true
    convert_to_grams: true
    columns:
      - Total Fat (g)
      - Sodium (mg)
      - Protein (g)
      - Dietary Fiber (g)
    categories:
      - Bacon
      - Bratwurst
      - Breakfast_Sausages
      - Burgers
      - Chicken_Strips
      - Breaded_Chicken_Filet
      - Unbreaded_Chicken_Breast
      - Deli_Ham
      - Deli_Turkey
      - Hot_Dogs
      - Meatballs
      - Nuggets
      - Pulled_Pork
      - Steak

  # Non-Sweet Dairy: Total Fat, Sodium
  nutrition_nonsweet_dairy:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    normalize_per_100g: true
    convert_to_grams: true
    columns:
      - Total Fat (g)
      - Sodium (mg)
    categories:
      - Butter
      - Cream_Cheese
      - Sour_Cream
      - Creamer
      - Milk
      - Barista_Milk

  # Cheese: Total Fat, Sodium, Total Carbohydrate
  nutrition_cheese:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    normalize_per_100g: true
    convert_to_grams: true
    columns:
      - Total Fat (g)
      - Sodium (mg)
      - Total Carbohydrate (g)
    categories:
      - Cheddar_Cheese
      - Mozzarella

  # Sweet Dairy: Total Fat, Total Sugars
  nutrition_sweet_dairy:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    normalize_per_100g: true
    convert_to_grams: true
    columns:
      - Total Fat (g)
      - Total Sugars (g)
    categories:
      - Ice_Cream_Hard_Serve
      - Yogurt
  # Ingredient text embeddings (Qwen3-Embedding)
  ingredient_text:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    model_name: Qwen/Qwen3-Embedding-0.6B
    instruction: "Instruct: Given a food ingredient list, identify products with similar taste, texture, and sensory properties\nQuery:"
  # DINOv3 image embeddings
  image:
    enabled: true
    weight: 1.0
    scaler_type: standard
    pca_dim: null
    model_name: dinov3_vitl16

missing_feature_strategy: skip
random_seed: 42

data:
  data_dir: data/competition
  labels_path: data/product_labels_manually_cleaned.csv
